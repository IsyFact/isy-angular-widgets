<div [class]="'flex flex-column gap-2 ' + labelOptionClass">
  <label [attr.id]="labelId || null" [class]="'label ' + labelFilledClass" [for]="fieldId">
    {{ label }}
    @if (isRequired()) {
      <span aria-hidden="true">*</span>
      <span class="visually-hidden">Pflichtfeld</span>
    }
  </label>
  <div class="flex-container">
    <ng-content></ng-content>
  </div>
  @if (shouldShowError()) {
    <div [attr.id]="fieldId + '-error'">
      <p-message severity="error" variant="simple">
        {{ errorMessage }}
      </p-message>
    </div>
  }
</div>
