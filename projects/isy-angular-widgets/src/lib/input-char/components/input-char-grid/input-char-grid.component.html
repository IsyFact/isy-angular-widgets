<!--
  The ARIA listbox/option pattern is intentional and must not be replaced by a native
  <select>/<option> (Sonar suggests this). A native control cannot provide the 2D grid
  layout, the geometric arrow-key navigation, Home/End/PageUp/PageDown paging, or the
  distinct Enter (insert) vs. Space (select) behaviour this widget requires. This is the
  spec-conformant WAI-ARIA listbox pattern with roving tabindex.
-->
<div
  #listbox
  role="listbox"
  class="character-listbox"
  [attr.aria-label]="ariaLabel"
  [attr.tabindex]="characters.length === 0 ? -1 : null"
>
  @for (zeichenObjekt of characters; track zeichenObjekt; let index = $index) {
    <!-- role="option" is required by the listbox pattern above; a native <option> is not applicable here. -->
    <div
      #cell
      role="option"
      class="character-option"
      [class.selected]="zeichenObjekt === selected"
      [class.disabled]="isDisabled(zeichenObjekt)"
      [attr.aria-selected]="zeichenObjekt === selected ? 'true' : 'false'"
      [attr.aria-disabled]="isDisabled(zeichenObjekt) ? 'true' : null"
      [attr.aria-label]="getCellAriaLabel(zeichenObjekt)"
      [attr.tabindex]="getTabindex(index)"
      (click)="onCellClick(index)"
      (keydown)="onKeydown($event, index)"
    >
      {{ zeichenObjekt.zeichen }}
    </div>
  }
</div>
