<p-toast [baseZIndex]="2000" />
<p-dialog
  [header]="headerTitle"
  [closeAriaLabel]="configService.getTranslation('wizard.aria.close')"
  [(visible)]="isVisible"
  [modal]="modal"
  [closable]="closable"
  [draggable]="draggable"
  [breakpoints]="breakpoints"
  [style]="{
    width: width + 'vw',
    height: height + 'vw'
  }"
  (visibleChange)="isVisibleChange.emit($event)"
>
  <p-stepper [value]="index + 1" [linear]="!allowFreeNavigation" (valueChange)="onStepperValueChange($event)">
    <p-step-list>
      @for (item of items; track $index; let i = $index) {
        <p-step [value]="i + 1" [disabled]="item.disabled ?? false">
          {{ item.label }}
        </p-step>
      }
    </p-step-list>
  </p-stepper>

  <ng-container [ngTemplateOutlet]="this.content?.get(index)?.templateRef ?? null"></ng-container>

  <ng-template pTemplate="footer">
    <div class="flex justify-end flex-wrap card-container">
      @if (!isSaved) {
        @if (index !== 0) {
          <button
            id="back-button"
            type="button"
            pRipple
            pButton
            [outlined]="true"
            class="flex items-center justify-center mr-2"
            (click)="previous()"
          >
            {{ labelBackButton }}
          </button>
        }
        @if (index !== items.length - 1) {
          <button
            id="next-button"
            type="button"
            pRipple
            pButton
            class="flex items-center justify-center mr-6"
            [disabled]="index === items.length - 1 || !allowNext"
            (click)="next()"
          >
            {{ labelNextButton }}
          </button>
        }
      }

      @if (index === items.length - 1 && !isSaved) {
        <button
          id="save-button"
          type="button"
          pRipple
          pButton
          class="flex items-center justify-center ml-6"
          [disabled]="(index !== items.length - 1 || !allowNext) && !isSaved"
          (click)="save()"
        >
          {{ labelSaveButton }}
        </button>
      }

      <button
        id="close-button"
        type="button"
        pRipple
        pButton
        [outlined]="true"
        class="flex items-center justify-center"
        [disabled]="isSaved && !closable"
        (click)="closeDialog()"
      >
        {{ labelCloseButton }}
      </button>
    </div>
  </ng-template>
</p-dialog>
