<h1>PrimeNG Messages</h1>
<div class="grid">
  <div class="col-12 flex flex-column gap-2">
    <h2 id="messages" class="section-heading">
      Messages
      <a
        class="section-anchor"
        href="#messages"
        (click)="scrollToWidget($event, 'messages')"
        aria-label="Link zu Messages"
        >🔗</a
      >
    </h2>
    @for (message of messages; track message.key) {
      <p-message
        [severity]="
          message.severity === 'success' ||
          message.severity === 'info' ||
          message.severity === 'warn' ||
          message.severity === 'secondary' ||
          message.severity === 'contrast' ||
          message.severity === 'error'
            ? message.severity
            : undefined
        "
        [closable]="false"
        >{{ message.detail }}</p-message
      >
    }
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h2 id="toast" class="section-heading">
      Toast
      <a class="section-anchor" href="#toast" (click)="scrollToWidget($event, 'toast')" aria-label="Link zu Toast"
        >🔗</a
      >
    </h2>
    <p-button (onClick)="showToastMessage()" label="Show" />
    <p-toast key="toast" position="bottom-right" />
  </div>
</div>
