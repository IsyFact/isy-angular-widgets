<h1>PrimeNG Menus</h1>
<h2>Content Splitter</h2>
<div class="grid">
  <div class="col-12 flex flex-column gap-2">
    <h3 id="breadcrumb" class="section-heading">
      Breadcrumb
      <a
        class="section-anchor"
        href="#breadcrumb"
        (click)="scrollToWidget($event, 'breadcrumb')"
        aria-label="Link zu Breadcrumb"
        >🔗</a
      >
    </h3>
    <p-breadcrumb [home]="{icon: 'pi pi-home'}" [model]="electronics" />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="steps" class="section-heading">
      Steps
      <a class="section-anchor" href="#steps" (click)="scrollToWidget($event, 'steps')" aria-label="Link zu Steps"
        >🔗</a
      >
    </h3>
    <p-steps
      [model]="stepItem"
      [readonly]="false"
      [activeIndex]="activeIndex"
      (activeIndexChange)="onActiveIndexChange($event)"
    />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="tabmenu" class="section-heading">
      TabMenu
      <a class="section-anchor" href="#tabmenu" (click)="scrollToWidget($event, 'tabmenu')" aria-label="Link zu TabMenu"
        >🔗</a
      >
    </h3>
    <p-tabs>
      <p-tablist>
        @for (tab of tabMenuOption; track tab.route) {
          <p-tab class="flex items-center gap-2" [value]="tab.route" routerLink="tab.route">
            <i [class]="tab.icon"></i>
            <span>{{ tab.label }}</span>
          </p-tab>
        }
      </p-tablist>
    </p-tabs>
  </div>
</div>
<p-divider />
<h2>Navigation Menu</h2>
<div class="grid">
  <div class="col-12 flex flex-column gap-2">
    <h3 id="menubar" class="section-heading">
      MenuBar
      <a class="section-anchor" href="#menubar" (click)="scrollToWidget($event, 'menubar')" aria-label="Link zu MenuBar"
        >🔗</a
      >
    </h3>
    <p-menubar id="menu-bar" [model]="menuBarOption" />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="megamenu" class="section-heading">
      MegaMenu
      <a
        class="section-anchor"
        href="#megamenu"
        (click)="scrollToWidget($event, 'megamenu')"
        aria-label="Link zu MegaMenu"
        >🔗</a
      >
    </h3>
    <p-megamenu id="mega-menu" [model]="megaMenuOptions" />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="panelmenu" class="section-heading">
      PanelMenu
      <a
        class="section-anchor"
        href="#panelmenu"
        (click)="scrollToWidget($event, 'panelmenu')"
        aria-label="Link zu PanelMenu"
        >🔗</a
      >
    </h3>
    <div class="col-3 flex flex-column gap-2">
      <p-panelmenu id="panel-menu" [model]="fileContainerOptions" />
    </div>
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="tieredmenu" class="section-heading">
      TieredMenu
      <a
        class="section-anchor"
        href="#tieredmenu"
        (click)="scrollToWidget($event, 'tieredmenu')"
        aria-label="Link zu TieredMenu"
        >🔗</a
      >
    </h3>
    <div class="col-3 flex flex-column gap-2">
      <p-tieredmenu id="tiered-menu" [model]="fileContainerOptions" />
    </div>
  </div>
</div>
<p-divider />
<h2>Other Menus</h2>
<div class="grid mb-3">
  <div class="col-12 flex flex-column gap-2">
    <h3 id="contextmenu" class="section-heading">
      ContextMenu
      <a
        class="section-anchor"
        href="#contextmenu"
        (click)="scrollToWidget($event, 'contextmenu')"
        aria-label="Link zu ContextMenu"
        >🔗</a
      >
    </h3>
    <img #logo src="assets/default-application-logo.jpg" alt="Logo" aria-haspopup="true" height="150" width="335" />
    <p-contextMenu id="context-menu" [target]="logo" [model]="contextMenuOption" />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <h3 id="menu" class="section-heading">
      Menu
      <a class="section-anchor" href="#menu" (click)="scrollToWidget($event, 'menu')" aria-label="Link zu Menu">🔗</a>
    </h3>
    <p-menu id="p-menu" [model]="option" styleClass="w-full" />
  </div>
</div>
