<p-toast [baseZIndex]="2000" />
<p-dialog
  [header]="headerTitle"
  [closeAriaLabel]="configService.getTranslation('wizard.aria.close')"
  [(visible)]="isVisible"
  [modal]="modal"
  [closable]="closable"
  [draggable]="draggable"
  [breakpoints]="breaktpoints"
  [style]="{
    width: width + 'vw',
    height: height + 'vw'
  }"
  (visibleChange)="isVisibleChange.emit($event)"
>
  <p-stepper [value]="index + 1" [linear]="!allowFreeNavigation" (valueChange)="onStepperValueChange($event)">
    <p-step-list>
      @for (item of items; track $index; let i = $index) {
        <p-step [value]="i + 1" [disabled]="item.disabled ?? false">
          {{ item.label }}
        </p-step>
      }
    </p-step-list>
  </p-stepper>

  <ng-container [ngTemplateOutlet]="this.content?.get(index)?.templateRef ?? null"></ng-container>

  <ng-template pTemplate="footer">
    @if (footerTemplate) {
      <ng-container
        [ngTemplateOutlet]="footerTemplate.templateRef"
        [ngTemplateOutletContext]="footerContext"
      ></ng-container>
    } @else {
      <div class="flex align-items-center justify-content-between flex-wrap gap-3 card-container w-full">
        <div class="flex align-items-center">
          <button
            id="close-button"
            type="button"
            pRipple
            pButton
            [outlined]="true"
            class="flex align-items-center justify-content-center"
            [disabled]="!canClose"
            (click)="closeDialog()"
          >
            {{ labelCloseButton }}
          </button>
        </div>

        <div class="flex align-items-center justify-content-center flex-wrap gap-2">
          @if (showBackButton) {
            <button
              id="back-button"
              type="button"
              pRipple
              pButton
              [outlined]="true"
              class="flex align-items-center justify-content-center"
              (click)="previous()"
            >
              {{ labelBackButton }}
            </button>
          }
          @if (showNextButton) {
            <button
              id="next-button"
              type="button"
              pRipple
              pButton
              class="flex align-items-center justify-content-center"
              [disabled]="!allowNext"
              (click)="next()"
            >
              {{ labelNextButton }}
            </button>
          }
        </div>

        <div class="flex align-items-center justify-content-end">
          @if (showSaveButton) {
            <button
              id="save-button"
              type="button"
              pRipple
              pButton
              class="flex align-items-center justify-content-center"
              [disabled]="!allowNext"
              (click)="save()"
            >
              {{ labelSaveButton }}
            </button>
          }
        </div>
      </div>
    }
  </ng-template>
</p-dialog>
