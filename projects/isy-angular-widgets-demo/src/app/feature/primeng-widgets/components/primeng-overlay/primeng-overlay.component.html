<h1>PrimeNG Overlays</h1>
<h2>Dialogs</h2>
<div class="grid">
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading anchorId="sidebar" [level]="3" label="Sidebar" ariaLabel="Link zu Sidebar" />
    <p-button (onClick)="showSidebar($event)" label="Left Sidebar" />
    <p-drawer [(visible)]="visibleSidebar" position="left" (onHide)="onSidebarHide()">
      <h1>Sidebar Header</h1>
      Content
    </p-drawer>
  </div>
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading anchorId="dialog" [level]="3" label="Dialog" ariaLabel="Link zu Dialog" />
    <p-button (onClick)="showDialog($event)" label="Dialog" />
    <p-dialog
      header="Dialog Header"
      [modal]="true"
      [(visible)]="visibleDialog"
      [style]="{width: '25rem'}"
      (onHide)="onDialogHide()"
    >
      <div class="flex flex-column gap-2">Content</div>
      <div class="flex justify-content-end">
        <p-button label="Ok" (onClick)="closeDialog()" />
      </div>
    </p-dialog>
  </div>
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading
      anchorId="confirmdialog"
      [level]="3"
      label="ConfirmDialog"
      ariaLabel="Link zu ConfirmDialog"
    />
    <p-button (onClick)="confirmDialog($event)" label="Save" />
    <p-toast position="bottom-right" />
    <p-confirmdialog key="confirmDialog" (onHide)="onConfirmDialogHide()" />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading anchorId="confirmpopup" [level]="3" label="ConfirmPopup" ariaLabel="Link zu ConfirmPopup" />
    <p-button (onClick)="confirmPopup($event)" label="Save" />
    <p-toast position="bottom-right" />
    <p-confirmpopup key="confirmPopup" />
  </div>
</div>

<p-divider />

<h2>Extra-Info Widgets</h2>
<div class="grid mb-3">
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading anchorId="tooltip" [level]="3" label="Tooltip" ariaLabel="Link zu Tooltip" />
    <input
      id="tooltip-input"
      type="text"
      pInputText
      pTooltip="Enter something"
      tooltipPosition="bottom"
      placeholder="Tooltip bottom"
      class="w-full"
    />
  </div>
  <div class="col-12 flex flex-column gap-2">
    <demo-section-heading anchorId="overlaypanel" [level]="3" label="OverlayPanel" ariaLabel="Link zu OverlayPanel" />
    <p-button (onClick)="overlayPanel.toggle($event)" label="OverlayPanel" />
    <p-popover #overlayPanel>
      <div class="flex flex-column gap-2">Content</div>
    </p-popover>
  </div>
</div>
