<p-selectbutton
  styleClass="all-selectbutton"
  (onChange)="triggerUpdate(undefined)"
  [(ngModel)]="allOptionsModel"
  [options]="allOptions"
  optionLabel="label"
/>

<p-accordion [(value)]="activeIndex">
  @for (group of selectionGroups; let i = $index; track group) {
    @let item = dataToDisplay[group];

    <p-accordion-panel [value]="group">
      <p-accordion-header>{{ item.label }}</p-accordion-header>
      <p-accordion-content>
        <p-selectbutton
          [disabled]="disabled"
          [options]="item.values"
          [(ngModel)]="models[group]"
          (onChange)="triggerUpdate(group)"
          class="charset-selectbutton"
          [ngClass]="'charset-selectbutton--' + i"
        />
      </p-accordion-content>
    </p-accordion-panel>
  }
</p-accordion>
