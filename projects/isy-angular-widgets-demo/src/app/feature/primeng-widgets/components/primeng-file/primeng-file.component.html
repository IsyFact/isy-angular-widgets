<h1>PrimeNG File</h1>
<div class="grid">
  <div class="col-12 flex flex-column gap-2">
    <h2 id="fileupload" class="section-heading">
      FileUpload
      <a
        class="section-anchor"
        href="#fileupload"
        (click)="scrollToWidget($event, 'fileupload')"
        aria-label="Link zu FileUpload"
        >🔗</a
      >
    </h2>
    <p-fileupload
      mode="basic"
      chooseIcon="pi pi-upload"
      chooseLabel="FileUpload"
      name="fileUploadExample"
      url="https://www.primefaces.org/cdn/api/upload.php"
      accept="image/*,.pdf,.txt"
      [maxFileSize]="1000000"
      (onUpload)="onUpload($event)"
    />
  </div>
</div>
