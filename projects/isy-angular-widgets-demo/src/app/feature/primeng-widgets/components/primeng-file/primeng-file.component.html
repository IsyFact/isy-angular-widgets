<h1>PrimeNG File</h1>
<div class="grid grid-cols-12 gap-4">
  <div class="col-span-12 md:col-span-6 xl:col-span-4 flex flex-col gap-2">
    <h2>FileUpload</h2>
    <p-fileupload
      mode="basic"
      chooseIcon="pi pi-upload"
      chooseLabel="FileUpload"
      name="fileUploadExample"
      url="https://www.primefaces.org/cdn/api/upload.php"
      accept="image/*,.pdf,.txt"
      [maxFileSize]="1000000"
      (onUpload)="onUpload($event)"
    />
  </div>
</div>
